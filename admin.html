<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Admin-Bereich - Silvias Wollsite</title>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Admin-Schaltzentrale</h1>
            <nav style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <a href="index.html" class="nav-btn">Startseite / Über mich</a>
                <a href="galerie.html" class="nav-btn">Bildergalerie</a>
                <button id="logout-btn" class="nav-btn" style="background: #b56c70; color: white; border: none; cursor: pointer; font-family: inherit;">Abmelden</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="about-container" style="max-width: 600px; margin: 40px auto; flex-direction: column; gap: 20px;">
            <h2>Bilder hochladen</h2>
            <form id="upload-form" style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="bild-titel" required placeholder="Titel (z.B. Sonnenuntergang)" style="padding: 12px; border: 2px solid #f4ece1; border-radius: 8px;">
                
                <select id="bild-kategorie" style="padding: 12px; border: 2px solid #f4ece1; border-radius: 8px;">
                    <option value="haekeln">Häkeln</option>
                    <option value="stricken">Stricken</option>
                    <option value="malerei">Malereien</option>
                </select>
                
                <div style="padding: 20px; border: 2px dashed #7a6f62; border-radius: 8px; background: #fcfaf7; text-align: center;">
                    <input type="file" id="bild-datei" accept="image/*" multiple required>
                </div>

                <button type="submit" class="nav-btn active-nav" style="width: 100%; border: none; padding: 12px; cursor: pointer; font-weight: bold;">Hochladen</button>
            </form>
            <div id="upload-message" style="font-weight: 600; text-align: center; margin-top: 10px;"></div>
            
            <h3 style="margin-top: 40px; color: #7a6f62;">Hochgeladene Werke verwalten</h3>
            <div id="admin-bilder-liste"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
   
    
    <script src="script.js"></script>
</body>
</html>
