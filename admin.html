<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Admin-Bereich - Silvias Wollsite</title>
    <style>
        .drag-zone {
            padding: 30px 20px;
            border: 2px dashed #7a6f62;
            border-radius: 8px;
            background: #fcfaf7;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
        }
        .drag-zone.dragover {
            background: #f4ece1;
            border-color: #b56c70;
            transform: scale(1.01);
        }
        .drag-zone input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .preview-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #f4ece1;
            border-radius: 8px;
            background: #fff;
        }
        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            object-fit: contain;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="header-text">
                <h1>Admin-Schaltzentrale</h1>
                <p>Hier kannst du die Galerie verwalten</p>
            </div>
            <nav style="display: flex; gap: 15px; justify-content: center; margin-top: 20px; align-items: center;">
                <a href="index.html" class="nav-btn">Zur Startseite</a>
                <a href="galerie.html" class="nav-btn">Zur Galerie</a>
                <button onclick="abmelden()" class="nav-btn" style="background: #b56c70; color: white; border: none; cursor: pointer; padding: 10px 20px;">
                    Abmelden 🚪
                </button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="about-container" style="max-width: 600px; margin: 40px auto; flex-direction: column; gap: 20px;">
            
            <h2>Neues Bild hinzufügen</h2>
            
            <form id="upload-form" style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: 600; color: #7a6f62;">Titel des Bildes</label>
                    <input type="text" id="bild-titel" required placeholder="Z.B. Süßer Osterhase" 
                           style="padding: 12px; border: 2px solid #f4ece1; border-radius: 8px;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: 600; color: #7a6f62;">Kategorie</label>
                    <select id="bild-kategorie" style="padding: 12px; border: 2px solid #f4ece1; border-radius: 8px; background: white;">
                        <option value="haekeln">Häkeln</option>
                        <option value="stricken">Stricken</option>
                        <option value="malereien">🎨 Malereien</option>
                    </select>
                </div>

                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: 600; color: #7a6f62;">Bild auswählen oder hineinziehen</label>
                    <div class="drag-zone" id="drop-zone">
                        <span id="drag-zone-text" style="color: #7a6f62; font-weight: 500;">
                            📂 Datei hierher ziehen oder anklicken zum Auswählen
                        </span>
                        <input type="file" id="bild-datei" accept="image/*" required>
                    </div>
                </div>

                <div id="preview-box" class="preview-container">
                    <small style="color: #a89f91;">Ausgewähltes Bild:</small>
                    <img id="image-preview" src="" alt="Vorschau" class="preview-img">
                    <button type="button" id="remove-preview-btn" style="background: #b56c70; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">
                        Bild entfernen
                    </button>
                </div>

                <button type="submit" class="nav-btn active-nav" style="width: 100%; border: none; cursor: pointer; padding: 12px; margin-top: 10px;">
                    Bild hochladen
                </button>

            </form>

            <div id="upload-message" style="font-weight: 600; text-align: center;"></div>

            <div style="margin-top: 40px; width: 100%; border-top: 2px solid #f4ece1; padding-top: 30px;">
                <h2 style="margin-bottom: 10px;">Bilder verwalten & löschen</h2>
                <p style="font-size: 0.9rem; color: #a89f91; margin-bottom: 20px;">
                    Hier siehst du alle hochgeladenen Stücke.
                </p>
                
                <div id="admin-bilder-liste" style="display: flex; flex-direction: column; gap: 12px;"></div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Admin-Modus aktiv</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
