<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Silvias Wollsite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="header-text">
                <h1>Mitglieder-Login</h1>
                
            </div>
        </div>
    </header>

    <main class="container">
        <div class="about-container" style="max-width: 500px; margin: 40px auto; flex-direction: column;">
            
            <form id="login-form" style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="email" style="font-weight: 600; color: #7a6f62;">E-Mail-Adresse</label>
                    <input type="email" id="email" required placeholder="deine E-Mail" 
                           style="padding: 12px; border: 2px solid #f4ece1; border-radius: 8px; font-size: 1rem;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="password" style="font-weight: 600; color: #7a6f62;">Passwort</label>
                    <input type="password" id="password" required placeholder="Password" 
                           style="padding: 12px; border: 2px solid #f4ece1; border-radius: 8px; font-size: 1rem;">
                </div>

                <div id="login-message" style="font-weight: 600; text-align: center; min-height: 24px;"></div>

                <button type="submit" class="nav-btn active-nav" style="width: 100%; border: none; cursor: pointer; padding: 12px;">
                    Einloggen
                </button>
                
            </form>

        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

        firebase.initializeApp(firebaseConfig);
    </script>

    <script src="script.js"></script>
</body>
</html>
